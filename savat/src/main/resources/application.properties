spring.application.name=savat

# ── Database (usa variables de entorno en producción, fallback local) ──
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/sav_at?useSSL=false&serverTimezone=America/Lima}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASS:alexander}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Puerto dinámico (Render asigna $PORT)
server.port=${PORT:8080}

# CORS
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:4200}

app.jwt.secret=${JWT_SECRET:savat-clave-secreta-super-larga-para-firmar-tokens-jwt-2026-cambiar-en-produccion}
app.jwt.expiration-ms=86400000

